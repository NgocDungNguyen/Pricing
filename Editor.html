<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>huetestt - Store Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .product-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }

        .theme-link {
            font-weight: 600;
            text-decoration: underline;
            color: #d97706;
        }
        .theme-link:hover { color: #b45309; }

        .live-chat-link {
            font-weight: 600;
            text-decoration: underline;
            color: #d97706;
            cursor: pointer;
        }
        .live-chat-link:hover { color: #b45309; }

        .theme-select {
            color: #111827;
        }
        .theme-select option {
            padding: 6px 10px;
        }
        .theme-select optgroup {
            padding-top: 6px;
        }
    </style>
</head>
<body class="h-screen bg-gray-50 overflow-hidden flex flex-col">

    <!-- Top Bar -->
    <div class="bg-white border-b h-12 flex items-center px-4 justify-between text-sm">
        <div class="flex items-center gap-x-4">
            <div class="flex items-center gap-x-2">
                <div class="w-7 h-7 bg-blue-600 rounded flex items-center justify-center text-white text-xs font-bold">D</div>
                <span class="font-medium">Dawn</span>
            </div>
            <div class="bg-green-100 text-green-700 text-xs px-2.5 py-1 rounded-full flex items-center gap-x-1 font-medium">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                Live
            </div>
        </div>
        
        <div class="flex items-center gap-x-6 text-gray-600">
            <button onclick="togglePreview()" class="flex items-center gap-x-2 hover:text-gray-900">
                <i class="fa-solid fa-eye"></i>
                <span>Preview</span>
            </button>
            <div class="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center text-xs font-semibold">JD</div>
            <button class="bg-blue-600 text-white px-4 py-1.5 rounded-lg flex items-center gap-x-2 text-sm font-medium hover:bg-blue-700">
                <i class="fa-solid fa-save"></i>
                Save
            </button>
        </div>
    </div>

    <div class="flex flex-1 overflow-hidden">
        <!-- Left Sidebar -->
        <div class="w-80 border-r bg-white flex flex-col">
            <div class="p-4 border-b">
                <div class="relative">
                    <input type="text" class="w-full bg-gray-100 border border-transparent focus:border-gray-300 rounded-lg py-2 pl-10 text-sm" placeholder="Search app embeds">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400"></i>
                </div>
            </div>
            
            <div class="flex-1 overflow-auto p-4 space-y-6 text-sm">
                <div class="border border-gray-200 rounded-xl">
                    <div class="flex items-center justify-between px-3 py-2">
                        <button id="search-filter-core-header" class="flex items-center gap-x-2 flex-1 text-left" data-expanded="true">
                            <div class="w-5 h-5 bg-blue-100 text-blue-600 rounded flex items-center justify-center text-xs">📦</div>
                            <span class="font-medium">Search & filter core</span>
                            <i id="search-filter-core-icon" class="fa-solid fa-chevron-up text-xs text-gray-400 ml-auto"></i>
                        </button>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input id="app-embed-toggle" type="checkbox" checked class="sr-only peer">
                            <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:bg-blue-600"></div>
                        </label>
                    </div>
                    <div id="search-filter-core-content" class="px-3 pb-4">
                        <div id="notesContainer" class="pl-7 text-xs text-amber-600 leading-relaxed space-y-4"></div>
                        <div class="pl-7 space-y-4 mt-4">
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">Search input selector</label>
                                <input type="text" value="[name=q]" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">Link no results page</label>
                                <div class="flex items-center gap-x-2 bg-white border border-gray-300 rounded-lg px-3 py-2">
                                    <i class="fa-solid fa-link text-gray-400"></i>
                                    <span class="text-sm">All Products</span>
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">Collection grid selector</label>
                                <input type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="border border-gray-200 rounded-xl">
                    <div class="flex items-center justify-between px-3 py-2">
                        <button id="search-suggestion-header" class="flex items-center gap-x-2 flex-1 text-left" data-expanded="false">
                            <div class="w-5 h-5 bg-blue-100 text-blue-600 rounded flex items-center justify-center text-xs">💡</div>
                            <span class="font-medium">Search suggestion</span>
                            <i id="search-suggestion-icon" class="fa-solid fa-chevron-down text-xs text-gray-400 ml-auto"></i>
                        </button>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input id="search-suggestion-toggle" type="checkbox" class="sr-only peer">
                            <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:bg-blue-600"></div>
                        </label>
                    </div>
                    <div id="search-suggestion-content" class="px-3 pb-4 hidden">
                        <div class="pl-7 space-y-4 mt-2">
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">Search input selector</label>
                                <input type="text" placeholder="[name=q]" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">Predictive container selector</label>
                                <input type="text" placeholder=".predictive-search-form__content-wrapper,.predictive-search" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">Predictive container selector (mobile)</label>
                                <input type="text" placeholder="Fill in field" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Main Store Area -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <div class="bg-white border-b px-8 py-5 flex items-center justify-between">
                <div class="flex items-center gap-x-8">
                    <div class="text-2xl font-semibold tracking-tight">huetestt</div>
                    <nav class="flex items-center gap-x-8 text-sm">
                        <a href="#" class="font-medium text-gray-900">Home</a>
                        <a href="#" class="font-medium text-blue-600 border-b-2 border-blue-600 pb-1">Catalog</a>
                        <a href="#" class="font-medium text-gray-600 hover:text-gray-900">Contact</a>
                    </nav>
                </div>
                
                <div class="flex items-center gap-x-2">
                    <div class="text-xs font-medium text-gray-500 mr-2">Sidebar Notes:</div>
                    <button onclick="setSidebarMode(1)" class="px-3 py-1.5 text-xs bg-amber-100 hover:bg-amber-200 text-amber-700 rounded-xl">Has List</button>
                    <button onclick="setSidebarMode(2)" class="px-3 py-1.5 text-xs bg-amber-100 hover:bg-amber-200 text-amber-700 rounded-xl">No List</button>
                    
                    <div class="text-xs font-medium text-gray-500 mx-3">Modal:</div>
                    <button onclick="showCompatibilityModal(1)" class="px-3 py-1.5 text-xs bg-red-100 hover:bg-red-200 text-red-700 rounded-xl">Unsupported</button>
                    <button onclick="showCompatibilityModal(2)" class="px-3 py-1.5 text-xs bg-orange-100 hover:bg-orange-200 text-orange-700 rounded-xl">Supported</button>
                </div>
            </div>
            
            <div class="px-8 py-6 bg-white border-b text-center text-xl font-medium">
                Welcome to our store
            </div>
            
            <div class="flex flex-1 overflow-hidden">
                <div class="w-72 bg-white border-r overflow-auto p-6">
                    <h2 class="font-semibold text-lg mb-6">Filter by</h2>
                </div>
                <div class="flex-1 p-8 overflow-auto bg-gray-50">
                    <div class="grid grid-cols-4 gap-8">
                        <!-- Product placeholders -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Compatibility Modal -->
    <div id="compatibilityModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl w-full max-w-lg mx-4 overflow-hidden shadow-2xl">
            <div class="px-6 py-4 border-b flex items-center gap-3">
                <div class="w-8 h-8 bg-amber-100 text-amber-600 rounded-2xl flex items-center justify-center text-xl">⚠️</div>
                <h2 class="text-lg font-semibold">Compatibility Issue Detected</h2>
            </div>
            <div class="p-6 text-[15px] leading-relaxed text-gray-700" id="modalContent"></div>
            <div class="bg-gray-50 px-6 py-4 flex justify-end border-t">
                <button onclick="closeModal()" class="px-6 py-2.5 text-sm font-medium text-gray-700 hover:bg-gray-100 rounded-xl">Close</button>
            </div>
        </div>
    </div>

    <script>
        function setSidebarMode(mode) {
            const container = document.getElementById('notesContainer');
            
            if (mode === 1) {
                container.innerHTML = `
                    <p><strong>Note 1:</strong> If your theme is not in 
                        <a href="https://flintverse.gitbook.io/docs/findter-custom-filter-search/user-guide/app-activation-and-preview/app-activation-in-store" 
                           target="_blank" class="theme-link">this list</a>, 
                        the filter might not appear. Please 
                        <strong>contact us</strong> via 
                        <span onclick="goToLiveChat()" class="live-chat-link">live chat</span> 
                        to resolve theme compatibility.
                    </p>
                    <div>
                        <label class="block text-xs text-gray-900 mb-1">Theme list</label>
                        <select class="theme-select w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white text-gray-900 focus:outline-none focus:border-blue-500">
                            <option value="" selected>Select a theme</option>
                            <optgroup label="Free themes">
                                <option>Trade</option>
                                <option>Refresh</option>
                                <option>Origin</option>
                                <option>Vessel</option>
                                <option>Publisher</option>
                                <option>Rise</option>
                                <option>Savor</option>
                                <option>Craft</option>
                                <option>Studio</option>
                                <option>Ride</option>
                                <option>Horizon</option>
                                <option>Tinker</option>
                                <option>Fabric</option>
                                <option>Sense</option>
                                <option>Colorblock</option>
                                <option>Heritage</option>
                                <option>Taste</option>
                                <option>Ritual</option>
                                <option>Spotlight</option>
                                <option>Pitch</option>
                                <option>Dawn</option>
                                <option>Crave</option>
                                <option>Atelier</option>
                                <option>Dwell</option>
                            </optgroup>
                            <optgroup label="Paid themes">
                                <option>Arcane</option>
                                <option>Venice</option>
                                <option>Granivio</option>
                                <option>Mivo</option>
                                <option>Woody</option>
                                <option>Andie</option>
                                <option>Pleasure</option>
                                <option>Runase</option>
                                <option>Oak</option>
                                <option>Road</option>
                            </optgroup>
                        </select>
                    </div>
                    <p><strong>Note 2:</strong> This app uses its own product grid (instead of Shopify’s default) to display filters and product results. As a result, your collection page design may change.<br><br>
                        Please visit the 
                        <a href="#" onclick="goToCustomDesign()" class="font-semibold underline text-amber-700 hover:text-amber-800">Custom Design tab</a> 
                        or <strong>contact us</strong> via 
                        <span onclick="goToLiveChat()" class="live-chat-link">live chat</span> 
                        if you need further customization.
                    </p>
                `;
            } else {
                container.innerHTML = `
                    <p><strong>Note 1:</strong> Your theme may not work with the app, so the filter might not show. 
                        <span onclick="goToLiveChat()" class="live-chat-link">Contact live chat</span> for help fixing it.
                    </p>
                    <div>
                        <label class="block text-xs text-gray-900 mb-1">Theme list</label>
                        <select class="theme-select w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white text-gray-900 focus:outline-none focus:border-blue-500">
                            <option value="" selected>Select a theme</option>
                            <optgroup label="Free themes">
                                <option>Trade</option>
                                <option>Refresh</option>
                                <option>Origin</option>
                                <option>Vessel</option>
                                <option>Publisher</option>
                                <option>Rise</option>
                                <option>Savor</option>
                                <option>Craft</option>
                                <option>Studio</option>
                                <option>Ride</option>
                                <option>Horizon</option>
                                <option>Tinker</option>
                                <option>Fabric</option>
                                <option>Sense</option>
                                <option>Colorblock</option>
                                <option>Heritage</option>
                                <option>Taste</option>
                                <option>Ritual</option>
                                <option>Spotlight</option>
                                <option>Pitch</option>
                                <option>Dawn</option>
                                <option>Crave</option>
                                <option>Atelier</option>
                                <option>Dwell</option>
                            </optgroup>
                            <optgroup label="Paid themes">
                                <option>Arcane</option>
                                <option>Venice</option>
                                <option>Granivio</option>
                                <option>Mivo</option>
                                <option>Woody</option>
                                <option>Andie</option>
                                <option>Pleasure</option>
                                <option>Runase</option>
                                <option>Oak</option>
                                <option>Road</option>
                            </optgroup>
                        </select>
                    </div>
                    <p><strong>Note 2:</strong> This app uses its own product grid (instead of Shopify’s default) to display filters and product results. As a result, your collection page design may change.<br><br>
                        Please visit the 
                        <a href="#" onclick="goToCustomDesign()" class="font-semibold underline text-amber-700 hover:text-amber-800">Custom Design tab</a> 
                        or <strong>contact us</strong> via 
                        <span onclick="goToLiveChat()" class="live-chat-link">live chat</span> 
                        if you need further customization.
                    </p>
                `;
            }
        }

        function showCompatibilityModal(caseNum) {
            const content = document.getElementById('modalContent');
            
            if (caseNum === 1) {
                // Unsupported Theme
                content.innerHTML = `
                    <p>Hi, our system has detected that <strong>your current theme</strong> is <strong>not yet fully compatible</strong> with the Findter app.</p>
                    <p class="mt-3">This may cause the <strong>filters not to appear</strong> on your store.</p>
                    <p class="mt-3">The Findter team can help you resolve this compatibility issue <strong>for free</strong>.</p>
                    <p class="mt-4 font-medium">Please follow these steps:</p>
                    <ol class="mt-2 ml-5 list-decimal space-y-1 text-gray-700">
                        <li><strong>Comeback</strong> to <strong>Findter App Homepage</strong></li>
                        <li><strong>Contact us</strong> through <strong>live chat</strong></li>
                        <li><strong>Share</strong> your <strong>[store URL]</strong> and <strong>[collaborator code]</strong></li>
                    </ol>
                `;
            } else {
                // Supported Theme but has issue
                content.innerHTML = `
                    <p>Hi, we’ve detected a compatibility issue between the Findter app and <strong>your current theme</strong>.</p>
                    <p class="mt-3">Even though this theme is <strong>officially supported</strong>, some customizations may be affecting the <strong>filters</strong>.</p>
                    <p class="mt-3">The Findter team will help you fix this <strong>quickly and for free</strong>.</p>
                    <p class="mt-4 font-medium">Please follow these steps:</p>
                    <ol class="mt-2 ml-5 list-decimal space-y-1 text-gray-700">
                        <li><strong>Comeback</strong> to <strong>Findter App Homepage</strong></li>
                        <li><strong>Contact us</strong> through <strong>live chat</strong></li>
                        <li><strong>Share</strong> your <strong>[store URL]</strong> and <strong>[collaborator code]</strong></li>
                    </ol>
                `;
            }
            
            document.getElementById('compatibilityModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('compatibilityModal').classList.add('hidden');
        }

        function goToLiveChat() {
            window.location.href = "index.html";
        }

        function goToCustomDesign() {
            alert("Redirecting to Custom Design tab...");
        }

        function togglePreview() {
            alert("Store preview mode toggled (demo)");
        }

        // Initialize
        const STORAGE_KEYS = {
            APP_TOGGLE_STATE: 'findter_app_toggle_state',
            SEARCH_SUGGESTION_TOGGLE_STATE: 'findter_search_suggestion_toggle_state'
        };

        function setToggleState(isOn, persist) {
            const toggle = document.getElementById('app-embed-toggle');
            if (!toggle) return;
            toggle.checked = isOn;
            if (persist) {
                localStorage.setItem(STORAGE_KEYS.APP_TOGGLE_STATE, isOn ? 'on' : 'off');
            }
        }

        function setSearchSuggestionToggleState(isOn, persist) {
            const toggle = document.getElementById('search-suggestion-toggle');
            if (!toggle) return;
            toggle.checked = isOn;
            if (persist) {
                localStorage.setItem(STORAGE_KEYS.SEARCH_SUGGESTION_TOGGLE_STATE, isOn ? 'on' : 'off');
            }
        }

        function initAppToggle() {
            const toggle = document.getElementById('app-embed-toggle');
            if (!toggle) return;

            const storedState = localStorage.getItem(STORAGE_KEYS.APP_TOGGLE_STATE);
            if (storedState) {
                toggle.checked = storedState === 'on';
            }

            const params = new URLSearchParams(window.location.search);
            if (params.get('autoEnable') === '1') {
                setToggleState(true, true);
            }

            toggle.addEventListener('change', function() {
                localStorage.setItem(STORAGE_KEYS.APP_TOGGLE_STATE, toggle.checked ? 'on' : 'off');
            });
        }

        function initSearchSuggestionToggle() {
            const toggle = document.getElementById('search-suggestion-toggle');
            if (!toggle) return;

            const storedState = localStorage.getItem(STORAGE_KEYS.SEARCH_SUGGESTION_TOGGLE_STATE);
            if (storedState) {
                toggle.checked = storedState === 'on';
            }

            const params = new URLSearchParams(window.location.search);
            if (params.get('autoEnableSuggestion') === '1') {
                setSearchSuggestionToggleState(true, true);
            }

            toggle.addEventListener('change', function() {
                localStorage.setItem(STORAGE_KEYS.SEARCH_SUGGESTION_TOGGLE_STATE, toggle.checked ? 'on' : 'off');
            });
        }

        function setupAccordion(headerId, contentId, iconId) {
            const header = document.getElementById(headerId);
            const content = document.getElementById(contentId);
            const icon = document.getElementById(iconId);
            if (!header || !content || !icon) return;

            header.addEventListener('click', function() {
                const expanded = header.getAttribute('data-expanded') === 'true';
                header.setAttribute('data-expanded', String(!expanded));
                content.classList.toggle('hidden', expanded);
                icon.className = expanded ? 'fa-solid fa-chevron-down text-xs text-gray-400 ml-auto' : 'fa-solid fa-chevron-up text-xs text-gray-400 ml-auto';
            });
        }

        window.onload = () => {
            setSidebarMode(1);
            initAppToggle();
            initSearchSuggestionToggle();
            setupAccordion('search-filter-core-header', 'search-filter-core-content', 'search-filter-core-icon');
            setupAccordion('search-suggestion-header', 'search-suggestion-content', 'search-suggestion-icon');
        };
    </script>
</body>
</html>
